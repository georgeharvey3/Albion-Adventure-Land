name: Deploy to GitHub Pages

# Build the PWA and publish it to GitHub Pages on every push to main.
# The build runs `npm run ingest` (CSV → public/data/sites.json), which is the
# only step that touches the network: postcodes.io geocoding for the CAMRA
# source. GitHub-hosted runners have outbound network, and warmed results are
# committed in data/geocode-cache.json, so this stays fast and deterministic.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - uses: actions/configure-pages@v5
        with:
          # Enable Pages (Actions source) automatically on first run, so no
          # manual Settings → Pages step is needed.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
